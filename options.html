<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoFiller Options</title>
  <link rel="stylesheet" href="options.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-layout">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>AutoFiller</h1>
        <p class="subtitle">Architecture Configuration</p>
        <a href="help.html" target="_blank" style="font-size:13px; font-weight:600; color:#4f46e5; text-decoration:none; margin-top:12px; display:inline-block; padding: 6px 12px; background: #eef2ff; border-radius: 6px;">📖 View Documentation &rarr;</a>
      </div>
      
      <div class="global-actions">
        <button id="add-app-btn" class="btn primary-btn">+ Add Root App</button>
      </div>
      
      <!-- Dynamically populated list of apps & rules -->
      <div id="sidebar-nav" class="nav-tree"></div>
    </aside>
    
    <!-- Main Content Area -->
    <main class="main-content">
      <header class="main-header">
        <h2 id="editor-title">Select an item to configure</h2>
        <div class="header-actions" style="display:flex; align-items:center; gap: 16px;">
           <span id="save-status-indicator" style="font-size:13px; font-weight:600; color:#10b981; opacity:0; transition: opacity 0.3s;">✓ Auto-Saved</span>
           <button id="delete-config-btn" class="btn danger-btn sec-action" style="display:none;">Delete Configuration</button>
        </div>
      </header>
      
      <div id="editor-container" class="editor-container">
        <!-- Render Editor View -->
        <div class="empty-state">
           <p>No configuration selected.<br/>Choose an item from the sidebar or add a new App to get started.</p>
        </div>
      </div>
    </main>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
